name: OpenClaw Scheduled Developer

# Research experiment: autonomous AI developer using OpenClaw + Kilocode free models
# (with OpenRouter free as fallback).
# Runs every 8 hours and makes small incremental improvements to target repositories.
#
# ── Repository targeting ──
#   Scheduled runs: uses ALLOWED_REPOS variable (comma-separated owner/repo list).
#   Manual runs:    uses the "repositories" input, or falls back to ALLOWED_REPOS.
#   When multiple repos are listed the workflow picks ONE at random per run.
#
# ── Git identity ──
#   Commits use the real username + email of the GH_PAT owner so activity looks
#   like normal developer work (not a bot).
#
# ── Agent memory ──
#   The agent can read/write .openclaw/memory.md inside the target repo.
#   That file is committed alongside code changes so memory persists across runs
#   without external storage.

on:
  schedule:
    - cron: "0 */8 * * *" # Every 8 hours
  workflow_dispatch:
    inputs:
      task:
        description: "Custom task for the agent (leave empty for default small incremental improvement)"
        required: false
        type: string
      repositories:
        description: "Target repos (comma-separated owner/repo). Leave empty to use ALLOWED_REPOS variable."
        required: false
        type: string

permissions:
  contents: write

jobs:
  scheduled-develop:
    runs-on: ubuntu-latest
    # timeout-minutes: 30

    env:
      KILOCODE_API_KEY: ${{ secrets.KILOCODE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GH_TOKEN: ${{ secrets.GH_PAT }}
      GITHUB_TOKEN: ${{ secrets.GH_PAT }}
      WORKSPACE_DIR: /home/runner/.openclaw/workspace

    steps:
      # ─── 1. Resolve the real identity of the PAT owner ───
      - name: Resolve git identity from PAT owner
        id: identity
        run: |
          # Fetch the authenticated user's profile via the GitHub API.
          USER_JSON=$(gh api user 2>/dev/null || true)

          GIT_NAME=$(echo "$USER_JSON"  | jq -r '.name  // .login // empty')
          GIT_LOGIN=$(echo "$USER_JSON" | jq -r '.login // empty')
          GIT_EMAIL=$(echo "$USER_JSON" | jq -r '.email // empty')

          # GitHub may hide the email. Fall back to the noreply address.
          if [ -z "$GIT_EMAIL" ] || [ "$GIT_EMAIL" = "null" ]; then
            GIT_ID=$(echo "$USER_JSON" | jq -r '.id // empty')
            GIT_EMAIL="${GIT_ID}+${GIT_LOGIN}@users.noreply.github.com"
          fi

          # Use login as name if name field is empty.
          if [ -z "$GIT_NAME" ] || [ "$GIT_NAME" = "null" ]; then
            GIT_NAME="$GIT_LOGIN"
          fi

          echo "name=$GIT_NAME"   >> "$GITHUB_OUTPUT"
          echo "email=$GIT_EMAIL" >> "$GITHUB_OUTPUT"
          echo "login=$GIT_LOGIN" >> "$GITHUB_OUTPUT"

          echo "Resolved identity: $GIT_NAME <$GIT_EMAIL>"

      # ─── 2. Pick target repository ───
      - name: Select target repository
        id: repo
        run: |
          # Priority: workflow_dispatch input > ALLOWED_REPOS variable > current repo.
          INPUT_REPOS="${{ inputs.repositories }}"
          ALLOWED="${{ vars.ALLOWED_REPOS }}"
          CURRENT="${{ github.repository }}"

          RAW="${INPUT_REPOS:-${ALLOWED:-$CURRENT}}"

          # Trim spaces, split on commas, remove blanks.
          IFS=',' read -ra REPOS <<< "$RAW"
          CLEAN=()
          for r in "${REPOS[@]}"; do
            r="$(echo "$r" | xargs)"          # trim whitespace
            [ -n "$r" ] && CLEAN+=("$r")
          done

          if [ "${#CLEAN[@]}" -eq 0 ]; then
            echo "::error::No repositories configured. Set ALLOWED_REPOS variable or provide input."
            exit 1
          fi

          # Randomly select one repository from the list.
          INDEX=$(( RANDOM % ${#CLEAN[@]} ))
          SELECTED="${CLEAN[$INDEX]}"

          echo "selected=$SELECTED"           >> "$GITHUB_OUTPUT"
          echo "total=${#CLEAN[@]}"           >> "$GITHUB_OUTPUT"
          echo "Selected repo: $SELECTED (from ${#CLEAN[@]} candidates)"

      # ─── 3. Clone the target repository into the OpenClaw workspace ───
      - name: Clone target repository
        run: |
          REPO="${{ steps.repo.outputs.selected }}"
          echo "Cloning $REPO …"
          # Clone directly into the OpenClaw workspace directory so the agent
          # can see and modify the target repo files (fixes EISDIR workspace mismatch).
          # Ensure parent dir exists; git clone will populate the workspace dir.
          mkdir -p "$(dirname "$WORKSPACE_DIR")"
          git clone --depth 20 \
            "https://x-access-token:${{ secrets.GH_PAT }}@github.com/${REPO}.git" \
            "$WORKSPACE_DIR"

      - name: Configure git identity on target repo
        working-directory: ${{ env.WORKSPACE_DIR }}
        run: |
          git config user.name  "${{ steps.identity.outputs.name }}"
          git config user.email "${{ steps.identity.outputs.email }}"

      # ─── 4. Checkout this repo for skills / workflow reference ───
      - name: Exclude OpenClaw scaffold files from git tracking
        working-directory: ${{ env.WORKSPACE_DIR }}
        run: |
          # OpenClaw creates workspace scaffold files (AGENTS.md, SOUL.md, etc.)
          # that must not be committed to the target repo. Use .git/info/exclude
          # (a local-only gitignore) to keep them out of git add / commit.
          cat >> .git/info/exclude << 'EOF'
          AGENTS.md
          SOUL.md
          TOOLS.md
          IDENTITY.md
          USER.md
          HEARTBEAT.md
          BOOTSTRAP.md
          EOF

      - name: Checkout claw repo (for skills)
        uses: actions/checkout@v4
        with:
          path: claw-home

      # ─── 5. Toolchain ───
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install OpenClaw
        run: npm install -g openclaw@latest

      - name: Configure OpenClaw for headless CI
        run: |
          mkdir -p ~/.openclaw

          # Point OpenClaw at the target repo as its workspace, and load
          # our custom skills from the claw-home checkout.
          # Primary: Kilocode kilo-auto/free (zero-cost smart routing)
          # Fallback: OpenRouter free router model
          cat > ~/.openclaw/openclaw.json << OCEOF
          {
            "gateway": {
              "mode": "local"
            },
            "agents": {
              "defaults": {
                "model": {
                  "primary": "kilocode/kilo-auto/free",
                  "fallbacks": ["openrouter/free"]
                }
              }
            },
            "skills": {
              "load": {
                "extraDirs": ["${{ github.workspace }}/claw-home/skills"]
              }
            }
          }
          OCEOF

      - name: Discover OpenRouter free models (fallback catalog)
        # openclaw models scan inspects OpenRouter's free model catalog.
        # --no-probe skips live latency probes (faster in CI).
        # --yes accepts defaults non-interactively.
        # NOTE: We do NOT use --set-default here because the primary model
        # is kilocode/kilo-auto/free (set in openclaw.json). This scan only
        # refreshes the free-model catalog so OpenRouter fallback works well.
        run: |
          echo "::group::Scanning OpenRouter free models (fallback catalog)"
          openclaw models scan \
            --no-probe \
            --yes \
            2>&1 || echo "::warning::Free model scan failed; openrouter/free fallback still configured"
          echo "::endgroup::"

          echo "::group::Active model configuration"
          openclaw models status 2>&1 || true
          echo "::endgroup::"

      - name: Verify GitHub CLI auth
        run: gh auth status

      # ─── 6. Pre-seed memory file so the agent finds it reliably ───
      - name: Ensure memory file exists
        working-directory: ${{ env.WORKSPACE_DIR }}
        run: |
          MEMORY_FILE=".openclaw/memory.md"
          if [ ! -f "$MEMORY_FILE" ]; then
            mkdir -p "$(dirname "$MEMORY_FILE")"
            echo "# Agent Memory" > "$MEMORY_FILE"
            echo "" >> "$MEMORY_FILE"
            echo "<!-- Append one line per session: YYYY-MM-DD: what you did -->" >> "$MEMORY_FILE"
          fi

      # ─── 7. Run the agent (with retry loop until a commit is produced) ───
      - name: Run OpenClaw agent (retry until commit)
        working-directory: ${{ env.WORKSPACE_DIR }}
        env:
          TARGET_REPO: ${{ steps.repo.outputs.selected }}
          MAX_ATTEMPTS: "3"
        run: |
          MEMORY_FILE=".openclaw/memory.md"
          MEMORY_CONTEXT="
          Your memory from previous sessions is in $MEMORY_FILE — read it first.
          When you are done, append a short note (date + what you did) to $MEMORY_FILE
          so future sessions know the history. Keep $MEMORY_FILE under 80 lines — if it
          grows too long, summarize older entries into a single line."

          DEFAULT_TASK="You are a developer improving the repository ${TARGET_REPO} \
          with small scheduled commits. Examine the current files, recent git history, and \
          make ONE small, meaningful improvement. Ideas: add a utility function, improve \
          docs, add a small feature, create a test, fix code style, or add configuration. \
          If the project is empty or new, create a simple useful codebase to build upon. \
          After making changes, commit with a clear message and push to the current \
          branch. Keep changes minimal — use as few tokens as possible. \
          IMPORTANT: Do NOT clone any repositories — you are already inside the target \
          repo. Do NOT create directories named after GitHub owner/repo paths.
          ${MEMORY_CONTEXT}"

          TASK="${{ inputs.task }}"
          TASK="${TASK:-$DEFAULT_TASK}"

          echo "::group::Agent task"
          echo "$TASK"
          echo "::endgroup::"

          # Record the HEAD SHA before any attempt so we can detect new commits.
          BEFORE_SHA=$(git rev-parse HEAD)
          echo "HEAD before agent: $BEFORE_SHA"

          for ATTEMPT in $(seq 1 "$MAX_ATTEMPTS"); do
            echo ""
            echo "════════════════════════════════════════"
            echo "  Attempt $ATTEMPT / $MAX_ATTEMPTS"
            echo "════════════════════════════════════════"

            # ── Run the agent ──
            openclaw agent --local \
              --agent main \
              --message "$TASK" \
              --thinking low \
              --timeout 3600 \
              --json 2>&1 | tee /tmp/openclaw-output.json || true

            echo "::group::Agent output (attempt $ATTEMPT)"
            cat /tmp/openclaw-output.json 2>/dev/null || echo "No output captured"
            echo "::endgroup::"

            # ── Safety-net: commit any uncommitted changes the agent left behind ──
            if [ -n "$(git status --porcelain)" ]; then
              echo "Found uncommitted changes, committing…"

              # Remove nested .git dirs the agent may have created.
              find . -mindepth 2 -name .git -type d -prune -print | while read -r nested; do
                echo "Removing nested git dir: $nested"
                rm -rf "$nested"
              done

              git add -A
              git commit -m "chore: incremental improvement" || true
              git push || true
            fi

            # ── Check if a new commit was produced ──
            AFTER_SHA=$(git rev-parse HEAD)
            if [ "$AFTER_SHA" != "$BEFORE_SHA" ]; then
              echo "✅ New commit detected ($AFTER_SHA). Done."
              break
            fi

            if [ "$ATTEMPT" -eq "$MAX_ATTEMPTS" ]; then
              echo "⚠️  No new commit after $MAX_ATTEMPTS attempts. Giving up."
            else
              echo "⏳ No new commit yet. Retrying…"
            fi
          done

          echo "::group::Recent commits"
          git --no-pager log --oneline -5
          echo "::endgroup::"
