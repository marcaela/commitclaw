name: OpenClaw Daily Developer

# Research experiment: autonomous AI developer using OpenClaw + OpenRouter free models
# Runs once per day, makes small incremental improvements to this repository

on:
  schedule:
    - cron: "0 9 * * *" # Daily at 9:00 AM UTC
  workflow_dispatch:
    inputs:
      task:
        description: "Custom task for the agent (leave empty for default daily improvement)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  daily-develop:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GH_TOKEN: ${{ secrets.GH_PAT }}
      GITHUB_TOKEN: ${{ secrets.GH_PAT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 10

      - name: Configure git identity
        run: |
          git config user.name "openclaw[bot]"
          git config user.email "openclaw[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install OpenClaw
        run: npm install -g openclaw@latest

      - name: Configure OpenClaw for headless CI
        run: |
          mkdir -p ~/.openclaw

          # Write the OpenClaw configuration
          # Uses OpenRouter as the model provider with the auto router as fallback.
          # The scan step below will replace this with the best available free model.
          cat > ~/.openclaw/openclaw.json << 'OCEOF'
          {
            "gateway": {
              "mode": "local"
            },
            "agents": {
              "defaults": {
                "model": {
                  "primary": "openrouter/auto"
                }
              }
            }
          }
          OCEOF

      - name: Discover and set best free model
        # openclaw models scan inspects OpenRouter's free model catalog.
        # --set-default sets the best candidate as the primary model.
        # --no-probe skips live latency probes (faster in CI).
        # --yes accepts defaults non-interactively.
        run: |
          echo "::group::Scanning OpenRouter free models"
          openclaw models scan \
            --set-default \
            --no-probe \
            --yes \
            2>&1 || echo "::warning::Free model scan failed; falling back to openrouter/auto"
          echo "::endgroup::"

          echo "::group::Active model configuration"
          openclaw models status 2>&1 || true
          echo "::endgroup::"

      - name: Verify GitHub CLI auth
        run: gh auth status

      - name: Run OpenClaw agent
        working-directory: ${{ github.workspace }}
        run: |
          # Use custom task if provided via workflow_dispatch, otherwise use default
          DEFAULT_TASK="You are an autonomous developer improving this repository daily. \
          Examine the current files, recent git history, and make ONE small, meaningful \
          improvement. Ideas: add a utility function, improve docs, add a small feature, \
          create a test, fix code style, or add configuration. If the project is empty or \
          new, create a simple useful codebase to build upon. After making changes, commit \
          with a clear message and push to the current branch. Keep changes minimal — use \
          as few tokens as possible."

          TASK="${{ inputs.task }}"
          TASK="${TASK:-$DEFAULT_TASK}"

          echo "::group::Agent task"
          echo "$TASK"
          echo "::endgroup::"

          # Run the agent in local embedded mode (no gateway needed)
          openclaw agent --local \
            --message "$TASK" \
            --thinking low \
            --timeout 300 \
            --json 2>&1 | tee /tmp/openclaw-output.json || true

          echo "::group::Agent output"
          cat /tmp/openclaw-output.json 2>/dev/null || echo "No output captured"
          echo "::endgroup::"

      - name: Push any uncommitted changes
        # Safety net: if the agent made file changes but didn't commit/push,
        # this step handles it.
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Found uncommitted changes, committing..."
            git add -A
            git commit -m "chore: openclaw daily improvement (auto-commit)" || true
            git push || true
          else
            echo "No uncommitted changes found."
          fi

          # Show what happened
          echo "::group::Recent commits"
          git --no-pager log --oneline -5
          echo "::endgroup::"
